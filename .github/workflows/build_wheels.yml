name: Build & Publish Wheels

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag or ref to build and publish"
        required: false
        type: string

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}
      - name: Build sdist
        run: pipx run build --sdist
      - name: Install package from sdist
        run: pip install dist/*.tar.gz
      - name: Smoke test import
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys
          import tempfile

          with tempfile.TemporaryDirectory() as tmp:
              subprocess.run(
                  [sys.executable, "-c", "import arnio"],
                  cwd=tmp,
                  check=True,
                  env={**os.environ, "PYTHONPATH": ""},
              )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2
        env:
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_TEST_COMMAND: >-
            python -c "import pathlib, sys, pytest; sys.path.append(str(pathlib.Path(r'{project}'))); raise SystemExit(pytest.main([str(pathlib.Path(r'{project}') / 'tests'), '-v', '--tb=short', '-x']))"

      - name: Set up Python for wheel smoke test
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke test wheel install
        run: python tests/smoke_wheel_install.py --wheelhouse wheelhouse

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi  # requires a "pypi" environment configured in repo settings
    permissions:
      id-token: write  # required for trusted publishing

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
